<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Social App - My Network</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

/* HEADER */
header{
    background:#111827;
    padding:15px;
    text-align:center;
    font-size:22px;
    color:#38bdf8;
    font-weight:bold;
}

/* CONTAINER */
.container{
    max-width:700px;
    margin:20px auto;
    padding:10px;
}

/* PROFILE CARD */
.profile{
    background:#1f2937;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

/* POST BOX */
.post-box{
    background:#111827;
    padding:10px;
    border-radius:10px;
    margin-bottom:15px;
}

textarea, input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:none;
    border-radius:8px;
}

button{
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

/* POST */
.post{
    background:#1f2937;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.post img, .post video{
    width:100%;
    margin-top:10px;
    border-radius:10px;
}

/* ACTIONS */
.actions{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.btn{
    background:#2563eb;
    padding:5px 10px;
    border-radius:6px;
    cursor:pointer;
}

/* COMMENT */
.comment{
    margin-top:5px;
    font-size:14px;
    color:#cbd5e1;
}
</style>
</head>

<body>

<header>🌐 My Social Network</header>

<div class="container">

    <!-- PROFILE -->
    <div class="profile">
        <h3>👤 Mon Profil</h3>
        <input id="name" placeholder="Your name">
        <input id="bio" placeholder="Short bio">
        <button onclick="saveProfile()">Save Profile</button>
        <p id="profileDisplay"></p>
    </div>

    <!-- POST BOX -->
    <div class="post-box">
        <textarea id="text" placeholder="Inona no eritreritrao?"></textarea>
        <input id="image" placeholder="Image URL (optional)">
        <input id="video" placeholder="Video URL (optional)">
        <button onclick="addPost()">Publier</button>
    </div>

    <!-- FEED -->
    <div id="feed"></div>

</div>

<script>
let posts = JSON.parse(localStorage.getItem("posts")) || [];
let profile = JSON.parse(localStorage.getItem("profile")) || {};

function saveProfile(){
    profile = {
        name: document.getElementById("name").value,
        bio: document.getElementById("bio").value
    };

    localStorage.setItem("profile", JSON.stringify(profile));
    showProfile();
}

function showProfile(){
    document.getElementById("profileDisplay").innerHTML =
    profile.name ? `<b>${profile.name}</b><br>${profile.bio}` : "";
}

function addPost(){
    let post = {
        text: document.getElementById("text").value,
        image: document.getElementById("image").value,
        video: document.getElementById("video").value,
        likes:0,
        comments:[]
    };

    posts.unshift(post);
    localStorage.setItem("posts", JSON.stringify(posts));

    document.getElementById("text").value="";
    document.getElementById("image").value="";
    document.getElementById("video").value="";

    render();
}

function like(i){
    posts[i].likes++;
    localStorage.setItem("posts", JSON.stringify(posts));
    render();
}

function comment(i){
    let c = prompt("Write comment:");
    if(c){
        posts[i].comments.push(c);
        localStorage.setItem("posts", JSON.stringify(posts));
        render();
    }
}

function render(){
    let feed = document.getElementById("feed");
    feed.innerHTML="";

    posts.forEach((p,i)=>{
        feed.innerHTML += `
        <div class="post">
            <div>${p.text}</div>

            ${p.image ? `<img src="${p.image}">` : ""}
            ${p.video ? `<video src="${p.video}" controls></video>` : ""}

            <div class="actions">
                <div class="btn" onclick="like(${i})">👍 Like (${p.likes})</div>
                <div class="btn" onclick="comment(${i})">💬 Comment</div>
            </div>

            <div class="comment">
                ${p.comments.map(c=> "• "+c).join("<br>")}
            </div>
        </div>
        `;
    });
}

showProfile();
render();
</script>

</body>
</html>
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>My Social Network</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

header{
    background:#111827;
    padding:15px;
    text-align:center;
    font-size:22px;
    color:#38bdf8;
    font-weight:bold;
}

.container{
    max-width:700px;
    margin:20px auto;
    padding:10px;
}

/* PROFILE */
.profile{
    background:#1f2937;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    text-align:center;
}

.profile img{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:10px;
}

/* POST */
.post-box{
    background:#111827;
    padding:10px;
    border-radius:10px;
}

textarea, input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:none;
    border-radius:8px;
}

button{
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

/* FEED */
.post{
    background:#1f2937;
    margin-top:10px;
    padding:10px;
    border-radius:10px;
}

.post img{
    width:100%;
    border-radius:10px;
    margin-top:10px;
}

.actions{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.btn{
    background:#2563eb;
    padding:5px 10px;
    border-radius:6px;
    cursor:pointer;
}

.comment{
    font-size:14px;
    color:#cbd5e1;
    margin-top:5px;
}
</style>
</head>

<body>

<header>🌐 My Social Network</header>

<div class="container">

    <!-- PROFILE -->
    <div class="profile">
        <img id="profilePic" src="https://via.placeholder.com/100">

        <input id="name" placeholder="Your name">
        <input id="bio" placeholder="Bio">

        <input type="file" id="profileImage" accept="image/*">

        <button onclick="saveProfile()">Save Profile</button>

        <p id="profileText"></p>
    </div>

    <!-- POST -->
    <div class="post-box">
        <textarea id="text" placeholder="Inona no eritreritrao?"></textarea>

        <input type="file" id="postImage" accept="image/*">

        <button onclick="addPost()">Publier</button>
    </div>

    <div id="feed"></div>

</div>

<script>
let posts = JSON.parse(localStorage.getItem("posts")) || [];
let profile = JSON.parse(localStorage.getItem("profile")) || {};

// convert image → base64
function toBase64(file){
    return new Promise((resolve)=>{
        let reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(file);
    });
}

// PROFILE SAVE
async function saveProfile(){
    let file = document.getElementById("profileImage").files[0];

    if(file){
        profile.image = await toBase64(file);
    }

    profile.name = document.getElementById("name").value;
    profile.bio = document.getElementById("bio").value;

    localStorage.setItem("profile", JSON.stringify(profile));
    showProfile();
}

function showProfile(){
    if(profile.image){
        document.getElementById("profilePic").src = profile.image;
    }

    document.getElementById("profileText").innerHTML =
        profile.name ? `<b>${profile.name}</b><br>${profile.bio}` : "";
}

// ADD POST
async function addPost(){
    let file = document.getElementById("postImage").files[0];
    let img = "";

    if(file){
        img = await toBase64(file);
    }

    let post = {
        text: document.getElementById("text").value,
        image: img,
        likes:0,
        comments:[]
    };

    posts.unshift(post);
    localStorage.setItem("posts", JSON.stringify(posts));

    document.getElementById("text").value="";
    document.getElementById("postImage").value="";

    render();
}

// LIKE
function like(i){
    posts[i].likes++;
    localStorage.setItem("posts", JSON.stringify(posts));
    render();
}

// COMMENT
function comment(i){
    let c = prompt("Comment:");
    if(c){
        posts[i].comments.push(c);
        localStorage.setItem("posts", JSON.stringify(posts));
        render();
    }
}

// RENDER
function render(){
    let feed = document.getElementById("feed");
    feed.innerHTML = "";

    posts.forEach((p,i)=>{
        feed.innerHTML += `
        <div class="post">
            <div>${p.text}</div>

            ${p.image ? `<img src="${p.image}">` : ""}

            <div class="actions">
                <div class="btn" onclick="like(${i})">👍 Like (${p.likes})</div>
                <div class="btn" onclick="comment(${i})">💬 Comment</div>
            </div>

            <div class="comment">
                ${p.comments.map(c=>"• "+c).join("<br>")}
            </div>
        </div>`;
    });
}

showProfile();
render();
</script>

</body>
</html>
